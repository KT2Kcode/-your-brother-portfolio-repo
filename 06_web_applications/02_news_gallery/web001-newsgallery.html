<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <title> New Slanted Navigation Bar - Gallery </title>
     <link rel="stylesheet" href="bootstrap.min.css">
     <link rel="stylesheet" href="font-awesome.min.css">
     <script src="jquery-3.3.1.js"></script>
     <style>
        body{
	     background-image: url(web001.gif); background-size: cover;
	     font-family: 'Roboto Condensed', sans-serif; font-weight: bold;
	     height: 100vh;
	}
	.container{
	     width: 80%; height: 40px;
	     position: relative; top: 40px; margin: 0 auto;
        }

	#logo{
           position: absolute; top: 0; left: 0;
	   color: white; margin-top: -180px; font-family: arial;
	}

	.navigation-wrapper{
	   position: relative;
	}
	
	.navigation-button{
	    will-change: transform; display: flex;
	    align-items: center; justify-content: center; flex-wrap: wrap; position: fixed;
	    z-index: 1; top: 40px; right: 100px;
            background: transparent; cursor: pointer;
	}

        .navigation-button .fa{
            border: 2px solid white; border-radius: 3px; padding: 10px; color: white;
        }

         .navigation-menu ul li{
             list-style: none; font-family: impact; font-weight: 300; color: hsl(0,0%,70%);
        }
          
          .navigation-menu{
             content: ''; position: fixed;
             top: 0; right: 0; width: 50%; height: 100%;
             background: white;
             transform: skewX(0deg) translate(100%,0); transform-origin: top right;
             transition: all .2s ease-in; z-index: -1;
           }
 
           .navigation-menu ul{
               transform: skewX(-8deg); transform-origin: topleft; position: fixed;
               right: 120px; top: 120px; width: 400px;
               text-align: right;
           }

           .navigation-menu ul li{
                position: relative; z-index: 999;
                font-size: 32px; color: hsl(0,0%,10%); line-height: 64px;
           }

            .navigation-menu ul li a{
                 border: none; color: hsl(0,0%,10%); text-decoration: none;
            }

            .navigation-menu.active{
                transform: skewX(8deg) translate(0,0);
            }

            .navigation-menu li{
                opacity: 0; transform: translate(0,10px); transition: all .0s ease-in .3s;
            }
            .navigation-menu.active li{
                opacity: 1; transform: translate(0,0); transition: all 0.2s ease-in 0s;
             }
            .navigation-menu.active li:nth-child(1){
                transition-delay: 0.3s;
             }
            .navigation-menu.active li:nth-child(2){
                transition-delay: 0.4s;
             }
            .navigation-menu.active li:nth-child(3){
                transition-delay: 0.5s;
             }
            .navigation-menu.active li:nth-child(4){
                transition-delay: 0.6s;
             }
            .navigation-menu.active li:nth-child(5){
                transition-delay: 0.7s;
             }
            .navigation-menu.active li:nth-child(6){
                transition-delay: 0.8s;
             }
            .navigation-menu.active li:nth-child(7){
                transition-delay: 0.9s;
             }

             .hero h1{
                margin-top: 178px; text-transform: uppercase;
                font-family: impact; font-size: 26px; letter-spacing: 4px; color: white;
             }

             span{
                  font-size: 65px; letter-spacing: 2px; font-family: impact;
             }

	     .button{
                 font-family: 'Roboto Condensed', sans-serif;
		 font-weight: normal; font-size: 12px; margin-top: 40px;
             }

             .btn1{
                 padding: 12px 25px;
                 background: #f20c4a;
                 text-decoration: none;
		 color: white;
                 border-top-left-radius: 20px;
                 border-bottom-left-radius: 20px;
             }
             .btn2{
                 padding: 12px 25px;
                 background: #fff;
                 text-decoration: none;
		 color: black;
                 border-top-right-radius: 20px;
                 border-bottom-right-radius: 20px;
             }


     </style>
</head>
<body>

	<div class="container">
	    <div id="logo">RETRO</div>
	    <div class="navigation-wrapper">
		<div class="navigation-button">
		    <i class="fa fa-bars"></i>
            </div>
              <div class="navigation-menu">
                <ul>
          <li><a href="web001-newslantednavbar.html" class="btn1">HOME</a></li>
		  		  <li><a href="">GALLERY</a></li>
		  <li><a href="web001-newscontact.html" class="btn1">CONTACT</a></li>
		  <li><a href="web001-newslocation.html" class="btn1">LOCATION</a></li>
		  <li><a href="web001-newstestimonial.html" class="btn1">TESTIMONIAL</a></li>
		  <li><a href="web001-newspricing.html" class="btn1">PRICING</a></li>
		  <li><a href="web001-newsabout.html" class="btn1">ABOUT</a></li>
                </ul>
              </div>
            </div>
           <section class="hero">
             <h1>CREATIVE DESIGN <br> <span>INTRODUCING - GALLERY</span></h1>
	     <div class="button">
		  <a href="" class="btn1">Gallery A</a>
		  <a href="" class="btn2">Gallery B</a>
	     </div>
           </section>
  <table width="750" border="1" cellspacing="1" cellpadding="1">
<caption>

    <tbody>
      <tr>
                 <th scope="col"><a href="web001-newslantednavbar.html">HOME</a></th>

</tbody>

        </div>
<script>
    var navButton = document.querySelector('.navigation-button');
var navMenu = document.querySelector('.navigation-menu');
var win = window;

function openMenu(event) {
  
  navButton.classList.toggle('active');
  navMenu.classList.toggle('active');

  event.preventDefault();
  event.stopImmediatePropagation();
}
  
function closeMenu(event) {
  if (navButton.classList.contains('active')) {
    navButton.classList.remove('active');
    navMenu.classList.remove('active');
  }
}
  navButton.addEventListener('click', openMenu, false);

win.addEventListener('click',closeMenu, false);
    
</script>

</body>
</html>
